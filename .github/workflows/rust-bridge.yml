name: Rust Bridge

on:
  pull_request:
    paths:
      - 'shared/rust-bridge/**'
      - 'shared/third_party/codex/**'
      - '.gitmodules'
      - '.github/workflows/rust-bridge.yml'
  push:
    branches: [ main ]
    paths:
      - 'shared/rust-bridge/**'
      - 'shared/third_party/codex/**'
      - '.gitmodules'
      - '.github/workflows/rust-bridge.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/rust
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libcap-dev clang cmake

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Generate Rust bridge sources
        env:
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        run: |
          ./apps/ios/scripts/sync-codex.sh --preserve-current
          cd shared/rust-bridge
          cargo run -p codex-mobile-codegen -- \
            --upstream ../third_party/codex/codex-rs/app-server-protocol/src/protocol/v2.rs \
            --common ../third_party/codex/codex-rs/app-server-protocol/src/protocol/common.rs \
            --out codex-mobile-client/src/types/codegen_types.generated.rs \
            --rpc-out codex-mobile-client/src/rpc/generated_client.generated.rs \
            --ffi-rpc-out codex-mobile-client/src/ffi/rpc.generated.rs

      - name: Cargo check (codex-bridge)
        env:
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        run: cargo check --manifest-path shared/rust-bridge/codex-bridge/Cargo.toml

      - name: Cargo check (codex-mobile-client)
        env:
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        run: cargo check --manifest-path shared/rust-bridge/codex-mobile-client/Cargo.toml

      - name: Cargo test
        env:
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        run: make rust-test
