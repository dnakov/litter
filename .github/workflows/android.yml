name: Android

on:
  pull_request:
    paths:
      - 'apps/android/**'
      - 'shared/rust-bridge/**'
      - '.github/workflows/android.yml'
  push:
    branches: [ main ]
    paths:
      - 'apps/android/**'
      - 'shared/rust-bridge/**'
      - '.github/workflows/android.yml'

jobs:
  generate-kotlin-bindings:
    runs-on: macos-15
    timeout-minutes: 45
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/android-bindings
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Generate UniFFI Kotlin bindings
        env:
          RUSTC_WRAPPER: sccache
          CARGO_INCREMENTAL: "0"
        run: |
          ./apps/ios/scripts/sync-codex.sh --preserve-current
          cd shared/rust-bridge
          ./generate-bindings.sh --kotlin-only

      - name: Upload Kotlin bindings
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-bindings
          path: shared/rust-bridge/generated/kotlin
          if-no-files-found: error

  build:
    needs: generate-kotlin-bindings
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/android
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms and NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0" "ndk;30.0.14904198"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev libcap-dev clang cmake

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Sync codex patches
        run: make sync

      - name: Download Kotlin bindings
        uses: actions/download-artifact@v4
        with:
          name: kotlin-bindings
          path: shared/rust-bridge/generated/kotlin

      - name: Mark Kotlin bindings ready
        run: |
          mkdir -p .build-stamps
          touch .build-stamps/bindings-kotlin

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build Rust JNI libs
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/30.0.14904198
          RUSTC_WRAPPER: sccache
        run: make rust-android

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble debug
        run: apps/android/gradlew -p apps/android :app:assembleDebug
