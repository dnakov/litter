name: Mac Catalyst TestFlight Release

on:
  workflow_dispatch:
    inputs:
      beta_group_names:
        description: "Comma-separated TestFlight beta groups (must have macOS enabled)"
        required: false
        default: "Internal Testers,External Testers"
        type: string
      wait_for_processing:
        description: "Wait for ASC processing before finishing"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  prepare-release-assets:
    runs-on: macos-26
    timeout-minutes: 90
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/mac-release
      SCCACHE_LOG: info
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install build dependencies
        run: brew install xcodegen meson ninja

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-macabi,x86_64-apple-ios-macabi

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Prime sccache
        run: |
          export SCCACHE_ERROR_LOG="$RUNNER_TEMP/sccache-mac.log"
          rm -f "$SCCACHE_ERROR_LOG"
          sccache --stop-server || true
          sccache --start-server
          sccache --show-stats || true

      - name: Prepare Mac Catalyst release assets
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_BUILD_JOBS: "1"
          IOS_RUST_PROFILE: mobile-release
          RUSTC_WRAPPER: sccache
        run: |
          set -euo pipefail
          export SCCACHE_ERROR_LOG="$RUNNER_TEMP/sccache-mac.log"
          trap 'status=$?; echo "==> sccache stats"; sccache --show-stats || true; if [ -f "$SCCACHE_ERROR_LOG" ]; then echo "==> sccache error log"; tail -200 "$SCCACHE_ERROR_LOG" || true; fi; exit $status' EXIT
          sccache --zero-stats || true
          ./apps/ios/scripts/build-rust.sh --preserve-current --macabi-only
          make xcgen
          echo "==> sccache stats after Mac release prep"
          sccache --show-stats || true

      - name: Package Mac release prep artifact
        run: |
          mkdir -p .ci-prep/mac
          tar -czf .ci-prep/mac/mac-release-prep.tgz -C . \
            apps/ios/GeneratedRust \
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift

      - name: Upload Mac release prep artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-release-prep
          path: .ci-prep/mac
          if-no-files-found: error

  upload-testflight:
    needs: prepare-release-assets
    runs-on: macos-26
    timeout-minutes: 150
    environment: release
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Validate required secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_P8_B64: ${{ secrets.ASC_PRIVATE_KEY_P8_B64 }}
          # Same App Store Connect app record hosts both iOS and Mac builds,
          # so IOS_APP_STORE_APP_ID doubles as the Mac record ID too.
          IOS_APP_STORE_APP_ID: ${{ secrets.IOS_APP_STORE_APP_ID }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          # Mac-specific .p12 must bundle BOTH an "Apple Distribution" (or
          # "3rd Party Mac Developer Application") cert AND the installer
          # cert ("3rd Party Mac Developer Installer"), since App Store
          # Connect rejects Mac App Store uploads without installer signing.
          MAC_DIST_CERT_P12_B64: ${{ secrets.MAC_DIST_CERT_P12_B64 }}
          MAC_DIST_CERT_PASSWORD: ${{ secrets.MAC_DIST_CERT_PASSWORD }}
          MAC_APP_STORE_PROFILE_B64: ${{ secrets.MAC_APP_STORE_PROFILE_B64 }}
        run: |
          set -euo pipefail
          required=(
            ASC_KEY_ID
            ASC_ISSUER_ID
            ASC_PRIVATE_KEY_P8_B64
            IOS_APP_STORE_APP_ID
            IOS_TEAM_ID
            MAC_DIST_CERT_P12_B64
            MAC_DIST_CERT_PASSWORD
            MAC_APP_STORE_PROFILE_B64
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Install build dependencies
        run: |
          set -euo pipefail
          brew install xcodegen jq
          HOMEBREW_NO_AUTO_UPDATE=0 brew install asc
          xcodebuild -version
          asc --version

      - name: Download Mac release prep artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-release-prep
          path: .ci-prep/mac

      - name: Restore Mac release prep
        run: |
          MAC_PREP_ROOT=.ci-prep/mac
          if [ -d "$MAC_PREP_ROOT/mac" ]; then
            MAC_PREP_ROOT="$MAC_PREP_ROOT/mac"
          fi
          tar -xzf "$MAC_PREP_ROOT/mac-release-prep.tgz" -C .

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_P8_B64: ${{ secrets.ASC_PRIVATE_KEY_P8_B64 }}
        run: |
          set -euo pipefail
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_PRIVATE_KEY_P8_B64" | base64 --decode > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          echo "ASC_PRIVATE_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install signing certificate and provisioning profile
        env:
          MAC_DIST_CERT_P12_B64: ${{ secrets.MAC_DIST_CERT_P12_B64 }}
          MAC_DIST_CERT_PASSWORD: ${{ secrets.MAC_DIST_CERT_PASSWORD }}
          MAC_APP_STORE_PROFILE_B64: ${{ secrets.MAC_APP_STORE_PROFILE_B64 }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/mac-dist-cert.p12"
          APP_PROFILE_PATH="$RUNNER_TEMP/mac-app-store.provisionprofile"
          KEYCHAIN_PATH="$RUNNER_TEMP/mac-build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$MAC_DIST_CERT_P12_B64" | base64 --decode > "$CERT_PATH"
          echo "$MAC_APP_STORE_PROFILE_B64" | base64 --decode > "$APP_PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          # Importing the .p12 will install every cert+key pair it contains
          # — both the application cert and the installer cert land in the
          # keychain from this single call.
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_DIST_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Mac provisioning profiles live in a different directory than iOS
          # mobileprovisions (which go under MobileDevice/...). Xcode's
          # xcodebuild looks for Mac profiles in Library/Developer/Xcode/...
          # The legacy Provisioning Profiles path also works for Catalyst.
          MAC_PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$MAC_PROFILE_DIR"

          profile_uuid="$(security cms -D -i "$APP_PROFILE_PATH" | plutil -extract UUID raw -)"
          profile_name="$(security cms -D -i "$APP_PROFILE_PATH" | plutil -extract Name raw -)"
          cp "$APP_PROFILE_PATH" "$MAC_PROFILE_DIR/$profile_uuid.provisionprofile"
          echo "APP_PROVISIONING_PROFILE_SPECIFIER=$profile_name" >> "$GITHUB_ENV"

      - name: Resolve release inputs
        run: |
          set -euo pipefail

          SCHEME="LitterMac"
          APP_BUNDLE_ID="com.sigkitten.litter"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            BETA_GROUP_NAMES="${{ inputs.beta_group_names }}"
            if [[ "${{ inputs.wait_for_processing }}" == "true" ]]; then
              WAIT_FOR_PROCESSING="1"
            else
              WAIT_FOR_PROCESSING="0"
            fi
          else
            BETA_GROUP_NAMES="Internal Testers,External Testers"
            WAIT_FOR_PROCESSING="0"
          fi

          echo "SCHEME=$SCHEME" >> "$GITHUB_ENV"
          echo "APP_BUNDLE_ID=$APP_BUNDLE_ID" >> "$GITHUB_ENV"
          echo "BETA_GROUP_NAMES=$BETA_GROUP_NAMES" >> "$GITHUB_ENV"
          echo "WAIT_FOR_PROCESSING=$WAIT_FOR_PROCESSING" >> "$GITHUB_ENV"

      - name: Build TestFlight PKG
        env:
          SCHEME: ${{ env.SCHEME }}
          APP_BUNDLE_ID: ${{ env.APP_BUNDLE_ID }}
          APP_STORE_APP_ID: ${{ secrets.IOS_APP_STORE_APP_ID }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          APP_PROVISIONING_PROFILE_SPECIFIER: ${{ env.APP_PROVISIONING_PROFILE_SPECIFIER }}
          EXPORT_SIGNING_STYLE: manual
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_PATH: ${{ env.ASC_PRIVATE_KEY_PATH }}
          BETA_GROUP_NAMES: ${{ env.BETA_GROUP_NAMES }}
          WAIT_FOR_PROCESSING: ${{ env.WAIT_FOR_PROCESSING }}
          TESTFLIGHT_SKIP_UPLOAD: "1"
        run: |
          set -euo pipefail
          ./apps/ios/scripts/testflight-upload-mac.sh

      - name: Upload to TestFlight
        env:
          SCHEME: ${{ env.SCHEME }}
          APP_BUNDLE_ID: ${{ env.APP_BUNDLE_ID }}
          APP_STORE_APP_ID: ${{ secrets.IOS_APP_STORE_APP_ID }}
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          APP_PROVISIONING_PROFILE_SPECIFIER: ${{ env.APP_PROVISIONING_PROFILE_SPECIFIER }}
          EXPORT_SIGNING_STYLE: manual
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_PATH: ${{ env.ASC_PRIVATE_KEY_PATH }}
          BETA_GROUP_NAMES: ${{ env.BETA_GROUP_NAMES }}
          WAIT_FOR_PROCESSING: ${{ env.WAIT_FOR_PROCESSING }}
          TESTFLIGHT_SKIP_BUILD: "1"
        run: |
          set -euo pipefail
          ./apps/ios/scripts/testflight-upload-mac.sh
