name: Mac Catalyst Direct Distribution

on:
  workflow_dispatch:
    inputs:
      attach_to_release:
        description: "Attach the .dmg to the GitHub Release with this tag (leave empty to skip)"
        required: false
        default: ""
        type: string
      skip_notarization:
        description: "Skip notarization (faster but the dmg won't pass Gatekeeper)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  prepare-release-assets:
    runs-on: macos-26
    timeout-minutes: 90
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"
      SCCACHE_BUCKET: rust-cache
      SCCACHE_ENDPOINT: ${{ secrets.SCCACHE_R2_ENDPOINT }}
      SCCACHE_REGION: auto
      SCCACHE_S3_USE_SSL: "true"
      SCCACHE_S3_KEY_PREFIX: ci/mac-direct-dist
      SCCACHE_LOG: info
      AWS_ACCESS_KEY_ID: ${{ secrets.SCCACHE_R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCCACHE_R2_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Install build dependencies
        run: brew install xcodegen meson ninja

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios-macabi,x86_64-apple-ios-macabi

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Prepare Mac Catalyst release assets
        env:
          CARGO_INCREMENTAL: "0"
          CARGO_BUILD_JOBS: "1"
          IOS_RUST_PROFILE: mobile-release
          RUSTC_WRAPPER: sccache
        run: |
          set -euo pipefail
          ./apps/ios/scripts/build-rust.sh --preserve-current --macabi-only
          make xcgen

      - name: Package Mac release prep artifact
        run: |
          mkdir -p .ci-prep/mac
          tar -czf .ci-prep/mac/mac-release-prep.tgz -C . \
            apps/ios/GeneratedRust \
            apps/ios/Sources/Litter/Bridge/UniFFICodexClient.generated.swift

      - name: Upload Mac release prep artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-release-prep-direct
          path: .ci-prep/mac
          if-no-files-found: error

  build-and-notarize:
    needs: prepare-release-assets
    runs-on: macos-26
    timeout-minutes: 90
    environment: release
    env:
      HOMEBREW_NO_AUTO_UPDATE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.3'

      - name: Validate required secrets
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_P8_B64: ${{ secrets.ASC_PRIVATE_KEY_P8_B64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          MAC_DEVELOPER_ID_CERT_P12_B64: ${{ secrets.MAC_DEVELOPER_ID_CERT_P12_B64 }}
          MAC_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MAC_DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          required=(
            ASC_KEY_ID
            ASC_ISSUER_ID
            ASC_PRIVATE_KEY_P8_B64
            IOS_TEAM_ID
            MAC_DEVELOPER_ID_CERT_P12_B64
            MAC_DEVELOPER_ID_CERT_PASSWORD
          )
          for name in "${required[@]}"; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required secret: $name" >&2
              exit 1
            fi
          done

      - name: Install build dependencies
        run: |
          set -euo pipefail
          brew install xcodegen jq
          xcodebuild -version

      - name: Download Mac release prep artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-release-prep-direct
          path: .ci-prep/mac

      - name: Restore Mac release prep
        run: |
          MAC_PREP_ROOT=.ci-prep/mac
          if [ -d "$MAC_PREP_ROOT/mac" ]; then
            MAC_PREP_ROOT="$MAC_PREP_ROOT/mac"
          fi
          tar -xzf "$MAC_PREP_ROOT/mac-release-prep.tgz" -C .

      - name: Decode App Store Connect API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_PRIVATE_KEY_P8_B64: ${{ secrets.ASC_PRIVATE_KEY_P8_B64 }}
        run: |
          set -euo pipefail
          ASC_KEY_PATH="$RUNNER_TEMP/AuthKey_${ASC_KEY_ID}.p8"
          echo "$ASC_PRIVATE_KEY_P8_B64" | base64 --decode > "$ASC_KEY_PATH"
          chmod 600 "$ASC_KEY_PATH"
          echo "ASC_PRIVATE_KEY_PATH=$ASC_KEY_PATH" >> "$GITHUB_ENV"

      - name: Install Developer ID signing certificate
        env:
          MAC_DEVELOPER_ID_CERT_P12_B64: ${{ secrets.MAC_DEVELOPER_ID_CERT_P12_B64 }}
          MAC_DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.MAC_DEVELOPER_ID_CERT_PASSWORD }}
          MAC_DEVELOPER_ID_PROFILE_B64: ${{ secrets.MAC_DEVELOPER_ID_PROFILE_B64 }}
        run: |
          set -euo pipefail

          CERT_PATH="$RUNNER_TEMP/mac-devid-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/mac-devid.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"

          echo "$MAC_DEVELOPER_ID_CERT_P12_B64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MAC_DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Optional Developer ID provisioning profile. Required if the
          # entitlements need APNs / iCloud / Push / etc. — those caps fail
          # to embed without a matching profile even under Developer ID.
          if [[ -n "${MAC_DEVELOPER_ID_PROFILE_B64:-}" ]]; then
            PROFILE_PATH="$RUNNER_TEMP/mac-devid.provisionprofile"
            echo "$MAC_DEVELOPER_ID_PROFILE_B64" | base64 --decode > "$PROFILE_PATH"

            PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
            mkdir -p "$PROFILE_DIR"
            profile_uuid="$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID raw -)"
            profile_name="$(security cms -D -i "$PROFILE_PATH" | plutil -extract Name raw -)"
            cp "$PROFILE_PATH" "$PROFILE_DIR/$profile_uuid.provisionprofile"
            echo "APP_PROVISIONING_PROFILE_SPECIFIER=$profile_name" >> "$GITHUB_ENV"
            echo "EXPORT_SIGNING_STYLE=manual" >> "$GITHUB_ENV"
          else
            # No explicit profile — let xcodebuild handle it via -allowProvisioningUpdates.
            echo "EXPORT_SIGNING_STYLE=automatic" >> "$GITHUB_ENV"
          fi

      - name: Build, sign, and notarize DMG
        env:
          SCHEME: LitterMac
          APP_BUNDLE_ID: com.sigkitten.litter
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          APP_PROVISIONING_PROFILE_SPECIFIER: ${{ env.APP_PROVISIONING_PROFILE_SPECIFIER }}
          EXPORT_SIGNING_STYLE: ${{ env.EXPORT_SIGNING_STYLE }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY_PATH: ${{ env.ASC_PRIVATE_KEY_PATH }}
          SKIP_NOTARIZATION: ${{ inputs.skip_notarization && '1' || '0' }}
        run: |
          set -euo pipefail
          ./apps/ios/scripts/direct-dist-mac.sh

      - name: Locate built DMG
        id: locate
        run: |
          set -euo pipefail
          DMG_PATH="$(find apps/ios/build/direct-dist-mac -maxdepth 1 -name '*.dmg' | head -n 1)"
          if [[ -z "$DMG_PATH" ]]; then
            echo "No DMG produced" >&2
            exit 1
          fi
          DMG_NAME="$(basename "$DMG_PATH")"
          shasum -a 256 "$DMG_PATH" > "${DMG_PATH}.sha256"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"
          echo "==> $DMG_NAME"
          shasum -a 256 "$DMG_PATH"

      - name: Upload DMG as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.locate.outputs.dmg_name }}
          path: |
            ${{ steps.locate.outputs.dmg_path }}
            ${{ steps.locate.outputs.dmg_path }}.sha256
          if-no-files-found: error

      - name: Attach DMG to GitHub Release
        if: ${{ inputs.attach_to_release != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.attach_to_release }}
          DMG_PATH: ${{ steps.locate.outputs.dmg_path }}
        run: |
          set -euo pipefail
          # `gh release upload --clobber` overwrites any prior asset with the
          # same filename, so re-running the workflow on the same tag just
          # replaces the .dmg instead of erroring out.
          gh release upload "$RELEASE_TAG" "$DMG_PATH" "${DMG_PATH}.sha256" --clobber
