name: Litter
options:
  bundleIdPrefix: com.litter
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  fileTypes:
    icon:
      file: true


settings:
  base:
    SWIFT_VERSION: "5.9"
    SWIFT_STRICT_CONCURRENCY: targeted
    MARKETING_VERSION: "1.0.4"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_OBJC_BRIDGING_HEADER: Sources/Litter/Bridge/codex_bridge_objc.h
    OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lcodex_mobile_client"
    HEADER_SEARCH_PATHS: "$(inherited) $(PROJECT_DIR)/GeneratedRust/Headers"
    SWIFT_INCLUDE_PATHS: "$(inherited) $(PROJECT_DIR)/GeneratedRust/Headers"
    "LIBRARY_SEARCH_PATHS[sdk=iphoneos*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-device"
    "LIBRARY_SEARCH_PATHS[sdk=iphonesimulator*]": "$(inherited) $(PROJECT_DIR)/GeneratedRust/ios-sim"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    DEVELOPMENT_TEAM: UH66Q8ZAYG
    # Xcode 15+ explicit-module builds. First clean build is slightly
    # slower, but module graphs are cached per-target after that, so
    # incremental Swift compiles in the app target drop substantially.
    SWIFT_ENABLE_EXPLICIT_MODULES: "YES"
    CLANG_ENABLE_EXPLICIT_MODULES: "YES"

packages:
  Hairball:
    url: https://github.com/dnakov/hairball.git
    branch: main
targets:
  Litter:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: Sources/Litter/Litter.entitlements
      properties:
        aps-environment: production
        com.apple.developer.carplay-voice-based-conversation: true
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    attributes:
      SystemCapabilities:
        com.apple.BackgroundModes:
          enabled: true
    sources:
      - path: Sources/Litter/Bridge/AecBridge.swift
      - path: Sources/Litter
        excludes:
          - Bridge/AecBridge.swift
          - "**/*.h"
      - path: Sources/LitterLiveActivity/CodexTurnLiveActivity.swift
      - path: Sources/LitterWatch/Models/WatchModels.swift
    resources:
      - path: Sources/Litter/Resources/ios_system/commandDictionary.plist
      - path: Sources/Litter/Resources/ios_system/extraCommandsDictionary.plist
      - path: Sources/Litter/Resources/Fonts
      - path: Sources/Litter/Resources/Themes
      - path: Sources/Litter/Resources/TipJarProducts.storekit
    dependencies:
      - sdk: CarPlay.framework
      - sdk: Security.framework
      - sdk: SystemConfiguration.framework
      - sdk: Network.framework
      - package: Hairball
        product: HairballUI
      - framework: Frameworks/ios_system/ios_system.xcframework
        embed: true
      - framework: Frameworks/ios_system/shell.xcframework
        embed: true
      - framework: Frameworks/ios_system/text.xcframework
        embed: true
      - framework: Frameworks/ios_system/files.xcframework
        embed: true
      - framework: Frameworks/ios_system/awk.xcframework
        embed: true
      - framework: Frameworks/ios_system/tar.xcframework
        embed: true
      - framework: Frameworks/ios_system/curl_ios.xcframework
        embed: true
      - framework: Frameworks/ios_system/ssh_cmd.xcframework
        embed: true
      - framework: Frameworks/ios_system/lg2.xcframework
        embed: true
      - framework: Frameworks/ios_system/openssl.xcframework
        embed: true
      - framework: Frameworks/ios_system/libssh2.xcframework
        embed: true
      - target: LitterLiveActivity
        embed: true
      # Watch app is gated for now — enable by re-adding the LitterWatch
      # dependency below. The target still lives in this project.yml and
      # builds via the standalone `LitterWatch` scheme.
      # - target: LitterWatch
      #   embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter
        INFOPLIST_FILE: Sources/Litter/Info.plist
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Litter/Bridge/codex_bridge_objc.h
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_KEY_UIBackgroundModes: "audio fetch remote-notification"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
          OTHER_LDFLAGS: "$(inherited) -lc++ -lz -lcodex_mobile_client"
        Release:
          CODE_SIGN_STYLE: "$(APP_CODE_SIGN_STYLE)"
          APP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(APP_CODE_SIGN_IDENTITY)"
          APP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(APP_PROVISIONING_PROFILE_SPECIFIER)"
          APP_PROVISIONING_PROFILE_SPECIFIER: ""
  LitterLiveActivity:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    entitlements:
      path: Sources/LitterLiveActivity/LitterLiveActivity.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterLiveActivity
      - path: Sources/Litter/Models/CodexTurnAttributes.swift
      - path: Sources/Litter/Models/CodexVoiceCallAttributes.swift
      - path: Sources/Litter/Models/LitterPalette.swift
      - path: Sources/Litter/Models/VoiceSessionControl.swift
      - path: Sources/Litter/Views/LockScreenCardView.swift
    resources:
      - path: Sources/LitterLiveActivity/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.liveactivity
        INFOPLIST_FILE: Sources/LitterLiveActivity/Info.plist
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(LIVE_ACTIVITY_CODE_SIGN_STYLE)"
          LIVE_ACTIVITY_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER)"
          LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER: ""
          ENABLE_DEBUG_DYLIB: NO
        Release:
          CODE_SIGN_STYLE: "$(LIVE_ACTIVITY_CODE_SIGN_STYLE)"
          LIVE_ACTIVITY_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(LIVE_ACTIVITY_CODE_SIGN_IDENTITY)"
          LIVE_ACTIVITY_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER)"
          LIVE_ACTIVITY_PROVISIONING_PROFILE_SPECIFIER: ""
  LitterWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    entitlements:
      path: Sources/LitterWatch/LitterWatch.entitlements
      properties:
        aps-environment: production
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterWatch
    resources:
      - path: Sources/Litter/Resources/Fonts
    dependencies:
      - target: LitterWatchComplications
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.watchkitapp
        INFOPLIST_FILE: Sources/LitterWatch/Info.plist
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        GENERATE_INFOPLIST_FILE: NO
        SDKROOT: watchos
        SUPPORTS_MACCATALYST: NO
        OTHER_LDFLAGS: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        HEADER_SEARCH_PATHS: "$(inherited)"
        SWIFT_INCLUDE_PATHS: "$(inherited)"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(WATCH_CODE_SIGN_STYLE)"
          WATCH_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: "$(WATCH_CODE_SIGN_STYLE)"
          WATCH_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(WATCH_CODE_SIGN_IDENTITY)"
          WATCH_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_PROVISIONING_PROFILE_SPECIFIER: ""

  LitterWatchComplications:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    entitlements:
      path: Sources/LitterWatchComplications/LitterWatchComplications.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.sigkitten.litter
    sources:
      - path: Sources/LitterWatchComplications
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sigkitten.litter.watchkitapp.complications
        INFOPLIST_FILE: Sources/LitterWatchComplications/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "4"
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
        SDKROOT: watchos
        OTHER_LDFLAGS: ""
        SWIFT_OBJC_BRIDGING_HEADER: ""
        HEADER_SEARCH_PATHS: "$(inherited)"
        SWIFT_INCLUDE_PATHS: "$(inherited)"
      configs:
        Debug:
          CODE_SIGN_STYLE: "$(WATCH_COMP_CODE_SIGN_STYLE)"
          WATCH_COMP_CODE_SIGN_STYLE: Automatic
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER: ""
        Release:
          CODE_SIGN_STYLE: "$(WATCH_COMP_CODE_SIGN_STYLE)"
          WATCH_COMP_CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "$(WATCH_COMP_CODE_SIGN_IDENTITY)"
          WATCH_COMP_CODE_SIGN_IDENTITY: ""
          PROVISIONING_PROFILE_SPECIFIER: "$(WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER)"
          WATCH_COMP_PROVISIONING_PROFILE_SPECIFIER: ""

  LitterTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/LitterTests
    dependencies:
      - target: Litter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false
  LitterUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: Tests/LitterUITests
      - path: SnapshotHelper.swift
    dependencies:
      - target: Litter
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        TEST_TARGET_NAME: Litter
        CODE_SIGNING_ALLOWED: false
        CODE_SIGNING_REQUIRED: false

schemes:
  LitterWatch:
    build:
      targets:
        LitterWatch: all
        LitterWatchComplications: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 2
  Litter:
    build:
      targets:
        Litter: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LitterTests
        - LitterUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
    management:
      isShown: true
      orderHint: 1
